# ── High-Res Uploads Configuration ───────────────────────────────────────────
# Path: /etc/nginx/conf.d/marketplace.conf or inside your server block

server {
    # ... your server config ...

    # Technical Fix: Allow providers to upload large, high-def videos without 413 errors.
    # A value of 0 disables checking of client request body size.
    client_max_body_size 0;

    location / {
        proxy_pass http://fastapi_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # If proxying MinIO directly through Nginx:
    location /media/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        client_max_body_size 0;
    }
}
